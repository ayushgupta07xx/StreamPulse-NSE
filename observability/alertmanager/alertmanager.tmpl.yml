# Template — the container entrypoint substitutes __DISCORD_WEBHOOK_URL__ from the
# DISCORD_WEBHOOK_URL env var (.env, gitignored). Never commit the real URL.
route:
  receiver: discord
  group_by: [alertname, severity]
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 4h

receivers:
  - name: discord
    discord_configs:
      - webhook_url: "__DISCORD_WEBHOOK_URL__"
        title: '{{ .CommonLabels.alertname }} [{{ .CommonLabels.severity }}]'
        message: '{{ range .Alerts }}{{ .Annotations.summary }}{{ "\n" }}{{ end }}'
