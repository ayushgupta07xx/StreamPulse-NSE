global:
  scrape_interval: 10s
  evaluation_interval: 10s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: redpanda
    metrics_path: /public_metrics
    static_configs:
      - targets: ["redpanda:9644"]

  - job_name: flink-jobmanager
    static_configs:
      - targets: ["flink-jobmanager:9249"]

  # Scaled service: DNS A-record discovery finds every TaskManager replica
  - job_name: flink-taskmanager
    dns_sd_configs:
      - names: ["flink-taskmanager"]
        type: A
        port: 9249

  - job_name: clickhouse
    static_configs:
      - targets: ["clickhouse:9363"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Synthetic tick generator /metrics (service added on Day 2)
  - job_name: generator
    static_configs:
      - targets: ["generator:8000"]
