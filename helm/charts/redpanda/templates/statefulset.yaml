apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-redpanda
  labels:
    app.kubernetes.io/name: redpanda
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  serviceName: {{ .Release.Name }}-redpanda-headless
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: redpanda
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redpanda
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Release.Name }}-redpanda
      containers:
        - name: redpanda
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          args:
            - redpanda
            - start
            - --kafka-addr=internal://0.0.0.0:{{ .Values.service.kafkaPort }}
            - --advertise-kafka-addr=internal://{{ .Release.Name }}-redpanda:{{ .Values.service.kafkaPort }}
            - --pandaproxy-addr=internal://0.0.0.0:{{ .Values.service.pandaproxyPort }}
            - --advertise-pandaproxy-addr=internal://{{ .Release.Name }}-redpanda:{{ .Values.service.pandaproxyPort }}
            - --schema-registry-addr=internal://0.0.0.0:{{ .Values.service.schemaRegistryPort }}
            - --rpc-addr=0.0.0.0:33145
            - --advertise-rpc-addr={{ .Release.Name }}-redpanda-0.{{ .Release.Name }}-redpanda-headless:33145
            - --mode=dev-container
            - --smp={{ .Values.smp }}
            - --memory={{ .Values.memory }}
          ports:
            - { name: kafka, containerPort: {{ .Values.service.kafkaPort }} }
            - { name: admin, containerPort: {{ .Values.service.adminPort }} }
            - { name: registry, containerPort: {{ .Values.service.schemaRegistryPort }} }
            - { name: proxy, containerPort: {{ .Values.service.pandaproxyPort }} }
          resources: {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "rpk cluster health | grep -E 'Healthy:\\s+true'"]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 8
          livenessProbe:
            httpGet:
              path: /v1/status/ready
              port: admin
            initialDelaySeconds: 30
            periodSeconds: 15
          volumeMounts:
            - name: data
              mountPath: /var/lib/redpanda/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.storage.storageClassName }}
        resources:
          requests:
            storage: {{ .Values.storage.size }}
