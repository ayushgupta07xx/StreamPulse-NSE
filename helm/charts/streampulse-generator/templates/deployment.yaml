apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-generator
  labels:
    app.kubernetes.io/name: generator
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: generator
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: generator
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Release.Name }}-generator
      containers:
        - name: generator
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --speed={{ .Values.speed }}
            - --anomalies={{ .Values.anomalies }}
            - --seed={{ .Values.seed }}
            - --ground-truth-out=/tmp/anomaly_ground_truth.json
          env:
            - { name: KAFKA_BOOTSTRAP, value: {{ .Values.kafkaBootstrap | quote }} }
            - { name: TICKERS, value: {{ .Values.tickers | quote }} }
            - { name: STREAMPULSE_DATA_DIR, value: /data }
          ports:
            - { name: metrics, containerPort: 8000 }
          resources: {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet: { path: /metrics, port: metrics }
            initialDelaySeconds: 10
      # reference data is baked into the image (ConfigMaps cap at 1 MB)
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-generator
spec:
  selector:
    app.kubernetes.io/name: generator
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - { name: metrics, port: 8000 }
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-generator
