apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-grafana-provisioning
data:
  datasources.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://{{ .Release.Name }}-prometheus:9090
      - name: ClickHouse
        type: grafana-clickhouse-datasource
        uid: clickhouse
        access: proxy
        isDefault: true
        jsonData:
          host: {{ .Release.Name }}-clickhouse
          port: 9000
          protocol: native
          username: default
          defaultDatabase: nse
        secureJsonData:
          password: ""
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: streampulse
        folder: StreamPulse
        type: file
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-grafana-dashboards
data:
{{ (.Files.Glob "files/dashboards/*.json").AsConfig | indent 2 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-grafana
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Release.Name }}-grafana
      containers:
        - name: grafana
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          env:
            - { name: GF_SECURITY_ADMIN_USER, value: {{ .Values.adminUser | quote }} }
            - { name: GF_SECURITY_ADMIN_PASSWORD, value: {{ .Values.adminPassword | quote }} }
            - { name: GF_INSTALL_PLUGINS, value: {{ .Values.plugins | quote }} }
            - { name: GF_DASHBOARDS_MIN_REFRESH_INTERVAL, value: "250ms" }
          ports:
            - { name: http, containerPort: 3000 }
          resources: {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 20
          livenessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 60
          volumeMounts:
            - { name: provisioning-ds, mountPath: /etc/grafana/provisioning/datasources }
            - { name: provisioning-db, mountPath: /etc/grafana/provisioning/dashboards }
            - { name: dashboards, mountPath: /var/lib/grafana/dashboards }
      volumes:
        - name: provisioning-ds
          configMap:
            name: {{ .Release.Name }}-grafana-provisioning
            items: [{ key: datasources.yml, path: datasources.yml }]
        - name: provisioning-db
          configMap:
            name: {{ .Release.Name }}-grafana-provisioning
            items: [{ key: dashboards.yml, path: dashboards.yml }]
        - name: dashboards
          configMap:
            name: {{ .Release.Name }}-grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-grafana
spec:
  selector:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - { name: http, port: 3000 }
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-grafana
