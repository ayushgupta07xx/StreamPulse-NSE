apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-clickhouse
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  serviceName: {{ .Release.Name }}-clickhouse
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: clickhouse
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clickhouse
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Release.Name }}-clickhouse
      containers:
        - name: clickhouse
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - { name: http, containerPort: {{ .Values.service.httpPort }} }
            - { name: native, containerPort: {{ .Values.service.nativePort }} }
            - { name: metrics, containerPort: {{ .Values.service.metricsPort }} }
          resources: {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet: { path: /ping, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /ping, port: http }
            initialDelaySeconds: 30
            periodSeconds: 15
          volumeMounts:
            - { name: data, mountPath: /var/lib/clickhouse }
            - { name: config, mountPath: /etc/clickhouse-server/config.d }
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-clickhouse-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.storage.storageClassName }}
        resources:
          requests:
            storage: {{ .Values.storage.size }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-clickhouse-config
data:
  prometheus.xml: |
    <clickhouse>
        <prometheus>
            <endpoint>/metrics</endpoint>
            <port>{{ .Values.service.metricsPort }}</port>
            <metrics>true</metrics>
            <events>true</events>
            <asynchronous_metrics>true</asynchronous_metrics>
        </prometheus>
    </clickhouse>
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-clickhouse
spec:
  selector:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - { name: http, port: {{ .Values.service.httpPort }} }
    - { name: native, port: {{ .Values.service.nativePort }} }
    - { name: metrics, port: {{ .Values.service.metricsPort }} }
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-clickhouse
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Release.Name }}-clickhouse
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: clickhouse
      app.kubernetes.io/instance: {{ .Release.Name }}
