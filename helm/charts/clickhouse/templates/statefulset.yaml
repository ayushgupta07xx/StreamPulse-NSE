apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-clickhouse
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  serviceName: {{ .Release.Name }}-clickhouse
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: clickhouse
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clickhouse
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Release.Name }}-clickhouse
      containers:
        - name: clickhouse
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - { name: http, containerPort: {{ .Values.service.httpPort }} }
            - { name: native, containerPort: {{ .Values.service.nativePort }} }
            - { name: metrics, containerPort: {{ .Values.service.metricsPort }} }
          resources: {{- toYaml .Values.resources | nindent 12 }}
          # startupProbe owns the cold-start window (up to 150 s on a busy
          # node); liveness only patrols after startup succeeds
          startupProbe:
            httpGet: { path: /ping, port: http }
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet: { path: /ping, port: http }
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /ping, port: http }
            periodSeconds: 20
            failureThreshold: 6
          volumeMounts:
            - { name: data, mountPath: /var/lib/clickhouse }
            # subPath mounts: add single files WITHOUT shadowing the image's
            # config.d/users.d (which carry listen_host + default-user setup)
            - { name: config, mountPath: /etc/clickhouse-server/config.d/prometheus.xml, subPath: prometheus.xml }
            - { name: users, mountPath: /etc/clickhouse-server/users.d/streampulse.xml, subPath: streampulse.xml }
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-clickhouse-config
        - name: users
          configMap:
            name: {{ .Release.Name }}-clickhouse-users
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.storage.storageClassName }}
        resources:
          requests:
            storage: {{ .Values.storage.size }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-clickhouse-config
data:
  prometheus.xml: |
    <clickhouse>
        <prometheus>
            <endpoint>/metrics</endpoint>
            <port>{{ .Values.service.metricsPort }}</port>
            <metrics>true</metrics>
            <events>true</events>
            <asynchronous_metrics>true</asynchronous_metrics>
        </prometheus>
    </clickhouse>
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-clickhouse-users
data:
  streampulse.xml: |
    <clickhouse>
        <users>
            <streampulse>
                <password>streampulse</password>
                <networks><ip>::/0</ip></networks>
                <profile>default</profile>
                <quota>default</quota>
            </streampulse>
        </users>
    </clickhouse>
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-clickhouse
spec:
  selector:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - { name: http, port: {{ .Values.service.httpPort }} }
    - { name: native, port: {{ .Values.service.nativePort }} }
    - { name: metrics, port: {{ .Values.service.metricsPort }} }
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-clickhouse
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Release.Name }}-clickhouse
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: clickhouse
      app.kubernetes.io/instance: {{ .Release.Name }}
