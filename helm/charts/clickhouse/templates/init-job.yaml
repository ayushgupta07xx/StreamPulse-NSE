# Applies schema.sql + materialized_views.sql + ttl_policies.sql after the
# server is ready. SQL ships in the chart's files/ dir (synced from
# clickhouse/ by `make sync-helm-files`); the Kafka broker address is
# templated for the k8s service name.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-clickhouse-init
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        # instance label is load-bearing: NetworkPolicies admit intra-release
        # traffic by this selector (clickhouse ingress must accept this pod)
        app.kubernetes.io/name: clickhouse-init
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command:
            - /bin/sh
            - -c
            - |
              set -e
              # network clients must use the provisioned user — CH 24.x keeps
              # `default` server-local (see users.d/streampulse.xml)
              CH="clickhouse-client --host {{ .Release.Name }}-clickhouse --user streampulse --password streampulse"
              until $CH --query 'SELECT 1' >/dev/null 2>&1; do
                echo waiting for clickhouse; sleep 3
              done
              for f in /sql/schema.sql /sql/materialized_views.sql /sql/ttl_policies.sql; do
                echo applying $f
                sed 's/redpanda:9092/{{ .Values.kafkaBroker }}/g' $f | $CH --multiquery
              done
              echo init complete
          volumeMounts:
            - { name: sql, mountPath: /sql }
      volumes:
        - name: sql
          configMap:
            name: {{ .Release.Name }}-clickhouse-sql
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-clickhouse-sql
data:
{{ (.Files.Glob "files/*.sql").AsConfig | indent 2 }}
