apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-flink-submit
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 8
  template:
    metadata:
      labels:
        # instance label is load-bearing: flink JM REST ingress admits
        # intra-release pods only once NetworkPolicies are on
        app.kubernetes.io/name: flink-submit
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: submit
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - { name: KAFKA_BOOTSTRAP, value: {{ .Values.kafkaBootstrap | quote }} }
          command:
            - /bin/bash
            - -c
            - |
              set -e
              until curl -sf http://{{ .Values.jobmanager }}/overview; do
                echo waiting for jobmanager; sleep 5
              done
              # cancel any live jobs first (idempotent re-submits on upgrade)
              LIVE='import json,sys; [print(j["jid"]) for j in json.load(sys.stdin).get("jobs",[]) if j["state"] in ("RUNNING","RESTARTING","CREATED")]'
              for jid in $(curl -s http://{{ .Values.jobmanager }}/jobs/overview | python3 -c "$LIVE"); do
                echo "cancelling stale job $jid"
                curl -s -X PATCH "http://{{ .Values.jobmanager }}/jobs/$jid?mode=cancel" || true
              done
              sleep 5
              {{- range .Values.jobs }}
              echo "submitting {{ . }}"
              flink run -m {{ $.Values.jobmanager }} -d \
                -py /opt/streampulse/flink/jobs/{{ . }}.py \
                --pyFiles /opt/streampulse/flink/jobs \
                {{- if $.Values.oooSeconds }} --ooo-seconds {{ $.Values.oooSeconds }}{{ end }}
              {{- end }}
              echo all jobs submitted
          volumeMounts:
            - { name: jobs, mountPath: /opt/streampulse/flink/jobs }
            - { name: jobs-common, mountPath: /opt/streampulse/flink/jobs/common }
      volumes:
        - name: jobs
          configMap:
            name: {{ .Release.Name }}-flink-jobs-src
        - name: jobs-common
          configMap:
            name: {{ .Release.Name }}-flink-jobs-common
