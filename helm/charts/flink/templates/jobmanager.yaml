apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-flink-jobmanager
  labels:
    app.kubernetes.io/name: flink
    app.kubernetes.io/component: jobmanager
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: flink
      app.kubernetes.io/component: jobmanager
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flink
        app.kubernetes.io/component: jobmanager
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Release.Name }}-flink
      containers:
        - name: jobmanager
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["jobmanager"]
          env:
            - name: FLINK_PROPERTIES
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-flink-conf
                  key: FLINK_PROPERTIES
            - name: KAFKA_BOOTSTRAP
              value: {{ .Values.kafkaBootstrap }}
          ports:
            - { name: rpc, containerPort: 6123 }
            - { name: blob, containerPort: 6124 }
            - { name: ui, containerPort: 8081 }
            - { name: metrics, containerPort: 9249 }
          resources: {{- toYaml .Values.jobmanager.resources | nindent 12 }}
          readinessProbe:
            httpGet: { path: /overview, port: ui }
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /overview, port: ui }
            initialDelaySeconds: 60
            periodSeconds: 15
          volumeMounts:
            - { name: checkpoints, mountPath: /opt/flink/checkpoints }
            - { name: jobs, mountPath: /opt/streampulse/flink/jobs }
            - { name: jobs-common, mountPath: /opt/streampulse/flink/jobs/common }
            - { name: refdata, mountPath: /opt/streampulse/data }
      volumes:
        - name: checkpoints
          emptyDir: {}
        - name: jobs
          configMap:
            name: {{ .Release.Name }}-flink-jobs-src
        - name: jobs-common
          configMap:
            name: {{ .Release.Name }}-flink-jobs-common
        - name: refdata
          configMap:
            name: {{ .Release.Name }}-flink-refdata
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-flink-jobmanager
spec:
  selector:
    app.kubernetes.io/name: flink
    app.kubernetes.io/component: jobmanager
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - { name: rpc, port: 6123 }
    - { name: blob, port: 6124 }
    - { name: ui, port: 8081 }
    - { name: metrics, port: 9249 }
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-flink
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Release.Name }}-flink-jobmanager
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: flink
      app.kubernetes.io/component: jobmanager
      app.kubernetes.io/instance: {{ .Release.Name }}
