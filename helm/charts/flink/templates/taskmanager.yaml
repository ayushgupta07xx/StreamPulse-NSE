apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-flink-taskmanager
  labels:
    app.kubernetes.io/name: flink
    app.kubernetes.io/component: taskmanager
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.taskmanager.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: flink
      app.kubernetes.io/component: taskmanager
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flink
        app.kubernetes.io/component: taskmanager
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Release.Name }}-flink
      containers:
        - name: taskmanager
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["taskmanager"]
          env:
            - name: FLINK_PROPERTIES
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-flink-conf
                  key: FLINK_PROPERTIES
            - name: KAFKA_BOOTSTRAP
              value: {{ .Values.kafkaBootstrap }}
          ports:
            - { name: data, containerPort: 6121 }
            - { name: rpc, containerPort: 6122 }
            - { name: metrics, containerPort: 9249 }
          resources: {{- toYaml .Values.taskmanager.resources | nindent 12 }}
          readinessProbe:
            tcpSocket: { port: rpc }
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: rpc }
            initialDelaySeconds: 45
            periodSeconds: 15
          volumeMounts:
            - { name: checkpoints, mountPath: /opt/flink/checkpoints }
            - { name: jobs, mountPath: /opt/streampulse/flink/jobs }
            - { name: jobs-common, mountPath: /opt/streampulse/flink/jobs/common }
            - { name: refdata, mountPath: /opt/streampulse/data }
      volumes:
        - name: checkpoints
          emptyDir: {}
        - name: jobs
          configMap:
            name: {{ .Release.Name }}-flink-jobs-src
        - name: jobs-common
          configMap:
            name: {{ .Release.Name }}-flink-jobs-common
        - name: refdata
          configMap:
            name: {{ .Release.Name }}-flink-refdata
---
{{- if .Values.taskmanager.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Release.Name }}-flink-taskmanager
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Release.Name }}-flink-taskmanager
  minReplicas: {{ .Values.taskmanager.hpa.minReplicas }}
  maxReplicas: {{ .Values.taskmanager.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.taskmanager.hpa.targetCPUUtilizationPercentage }}
{{- end }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Release.Name }}-flink-taskmanager
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: flink
      app.kubernetes.io/component: taskmanager
      app.kubernetes.io/instance: {{ .Release.Name }}
